services:
  web1:
    build: .
    environment:
      - SERVICE_NAME=web1
    ports:
      - "8001:8000" #expose for testing

  web2:
    build: .
    environment:
      - SERVICE_NAME=web2
    ports:
      - "8002:8000" 
  proxy:
      build: ./proxy
      ports:
        - "8080:8080" #only expose proxy to host
      volumes:
        - ./logs:/app/logs
      depends_on:
        - web1
        - web2